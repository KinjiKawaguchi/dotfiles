# prefix を Ctrl-a に変更
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ウィンドウ・ペイン番号を1始まりに
set -g base-index 1
setw -g pane-base-index 1

# ウィンドウを閉じたら番号を詰める
set -g renumber-windows on

# セッション破棄時に別のセッションに切り替える
set -g detach-on-destroy no-detached

# マウス操作を有効化
set -g mouse on

# セッション操作
bind S choose-tree -s
bind N command-prompt -p "new session:" "new-session -s '%%'"

# ウィンドウ操作
bind T new-window -c "#{pane_current_path}"
bind v copy-mode
bind p paste-buffer
bind L next-window
bind H previous-window

# ペイン分割
bind V split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"

# ペイン移動
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# vi-modeを有効化
setw -g mode-keys vi

# コピーモードでの操作をVimライクに
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi V send -X select-line
bind -T copy-mode-vi y send -X copy-pipe-and-cancel "pbcopy"
bind -T copy-mode-vi Escape send -X cancel

# ペインフォーカスの可視化
# 非アクティブペインを暗くする
set -g window-style 'fg=colour247,bg=colour236'
set -g window-active-style 'fg=default,bg=terminal'

# ボーダー: 太罫線 + アクティブペインに矢印インジケーター
set -g pane-border-lines heavy
set -g pane-border-indicators both
set -g pane-border-style 'fg=colour239'
set -g pane-active-border-style 'fg=colour208,bold'

# ボーダーにペイン情報を表示
set -g pane-border-status top
set -g pane-border-format ' #{?pane_active,#[bold]#P #{pane_current_command},#P} '

# フローティングポップアップ (prefix + t でトグル)
bind t display-popup -d '#{pane_current_path}' -xC -yC -w80% -h75% -E \
  "tmux attach -t popup || tmux new -s popup"

# ステータスバー: Prefix押下時にオレンジに変化
set -g status-style "#{?client_prefix,bg=colour208 fg=colour232,bg=colour232 fg=colour247}"
set -g status-left "#{?client_prefix,#[bg=colour208 fg=colour232 bold],#[bg=colour239 fg=colour248]} #{session_name} "
set -g status-right "#{?client_prefix,#[bg=colour208 fg=colour232],#[bg=colour239 fg=colour248]} %H:%M | %m/%d "

# プラグイン
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# セッション永続化: 15分ごとに自動保存 + tmux起動時に自動復元
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'
set -g @continuum-save-interval '15'

# tpm初期化 (この行は必ず末尾に置く)
run '~/.tmux/plugins/tpm/tpm'

